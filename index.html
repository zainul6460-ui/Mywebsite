<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AJ Fighter</title>
<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}
#game{
position:relative;
width:100%;
height:80vh;
background:#111;
overflow:hidden;
}
#player{
position:absolute;
bottom:20px;
left:45%;
width:50px;
height:50px;
background:red;
border-radius:10px;
}
.enemy{
position:absolute;
top:0;
width:40px;
height:40px;
background:lime;
border-radius:50%;
}
.bullet{
position:absolute;
width:8px;
height:20px;
background:yellow;
}
.controls{
margin-top:10px;
}
button{
padding:15px 25px;
font-size:18px;
margin:5px;
border:none;
border-radius:10px;
background:red;
color:white;
}
#score{
font-size:22px;
padding:10px;
}
</style>
</head>
<body>

<h1>AJ Fighter 🔥</h1>
<div id="score">Score: 0</div>

<div id="game">
<div id="player"></div>
</div>

<div class="controls">
<button onclick="moveLeft()">⬅️</button>
<button onclick="shoot()">🔫 Shoot</button>
<button onclick="moveRight()">➡️</button>
</div>

<script>
let game=document.getElementById("game");
let player=document.getElementById("player");
let score=0;
let playerX=45;

function moveLeft(){
if(playerX>0){playerX-=5; player.style.left=playerX+"%";}
}

function moveRight(){
if(playerX<90){playerX+=5; player.style.left=playerX+"%";}
}

function shoot(){
let bullet=document.createElement("div");
bullet.className="bullet";
bullet.style.left=(player.offsetLeft+20)+"px";
bullet.style.bottom="70px";
game.appendChild(bullet);

let b=setInterval(()=>{
bullet.style.bottom=(parseInt(bullet.style.bottom)+10)+"px";

document.querySelectorAll(".enemy").forEach(enemy=>{
if(
bullet.offsetTop<enemy.offsetTop+40 &&
bullet.offsetLeft<enemy.offsetLeft+40 &&
bullet.offsetLeft+8>enemy.offsetLeft
){
enemy.remove();
bullet.remove();
score++;
document.getElementById("score").innerHTML="Score: "+score;
clearInterval(b);
}
});

if(parseInt(bullet.style.bottom)>600){
bullet.remove();
clearInterval(b);
}
},30);
}

function createEnemy(){
let enemy=document.createElement("div");
enemy.className="enemy";
enemy.style.left=Math.random()*90+"%";
game.appendChild(enemy);

let e=setInterval(()=>{
enemy.style.top=(enemy.offsetTop+4)+"px";

if(enemy.offsetTop>500){
alert("Game Over 😢 Final Score: "+score);
location.reload();
clearInterval(e);
}

if(!enemy.isConnected){clearInterval(e);}
},50);
}

setInterval(createEnemy,1200);
</script>

</body>
</html>
