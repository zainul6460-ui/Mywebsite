<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AJ Fighter 3D Battle Lite</title>
<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
overflow:hidden;
text-align:center;
}
#topbar{
padding:10px;
background:#111;
font-size:20px;
}
#game{
position:relative;
width:100%;
height:78vh;
background:linear-gradient(#222,#111);
overflow:hidden;
}
.building{
position:absolute;
bottom:0;
width:60px;
background:#333;
}
#player{
position:absolute;
bottom:20px;
left:45%;
width:45px;
height:45px;
background:red;
border-radius:8px;
box-shadow:0 0 10px red;
}
.enemy{
position:absolute;
top:0;
width:40px;
height:40px;
background:lime;
border-radius:50%;
box-shadow:0 0 10px lime;
}
.bullet{
position:absolute;
width:8px;
height:20px;
background:yellow;
box-shadow:0 0 10px yellow;
}
.controls{
padding:8px;
background:#111;
}
button{
padding:14px 22px;
font-size:18px;
margin:4px;
border:none;
border-radius:10px;
background:red;
color:#fff;
}
</style>
</head>
<body>

<div id="topbar">
AJ Fighter 3D Battle Lite 🔫 | ❤️ 100 | Score: <span id="score">0</span>
</div>

<div id="game">
<div id="player"></div>
</div>

<div class="controls">
<button onclick="moveLeft()">⬅️</button>
<button onclick="shoot()">🔫 Shoot</button>
<button onclick="moveRight()">➡️</button>
</div>

<script>
let game=document.getElementById("game");
let player=document.getElementById("player");
let score=0;
let health=100;
let px=45;

// Buildings
for(let i=0;i<6;i++){
let b=document.createElement("div");
b.className="building";
b.style.left=(i*17)+"%";
b.style.height=(80+Math.random()*150)+"px";
game.appendChild(b);
}

function updateBar(){
document.getElementById("score").innerHTML=score;
document.getElementById("topbar").innerHTML=
"AJ Fighter 3D Battle Lite 🔫 | ❤️ "+health+" | Score: <span id='score'>"+score+"</span>";
}

function moveLeft(){
if(px>0){px-=5;player.style.left=px+"%";}
}

function moveRight(){
if(px<90){px+=5;player.style.left=px+"%";}
}

function shoot(){
let bullet=document.createElement("div");
bullet.className="bullet";
bullet.style.left=(player.offsetLeft+18)+"px";
bullet.style.bottom="70px";
game.appendChild(bullet);

let move=setInterval(()=>{
bullet.style.bottom=(parseInt(bullet.style.bottom)+12)+"px";

document.querySelectorAll(".enemy").forEach(enemy=>{
if(
bullet.offsetTop<enemy.offsetTop+40 &&
bullet.offsetLeft<enemy.offsetLeft+40 &&
bullet.offsetLeft+8>enemy.offsetLeft
){
enemy.remove();
bullet.remove();
score++;
updateBar();
clearInterval(move);
}
});

if(parseInt(bullet.style.bottom)>700){
bullet.remove();
clearInterval(move);
}
},30);
}

function createEnemy(){
let e=document.createElement("div");
e.className="enemy";
e.style.left=Math.random()*90+"%";
game.appendChild(e);

let fall=setInterval(()=>{
e.style.top=(e.offsetTop+4)+"px";

if(
e.offsetTop>player.offsetTop-40 &&
Math.abs(e.offsetLeft-player.offsetLeft)<40
){
health-=20;
updateBar();
e.remove();
clearInterval(fall);

if(health<=0){
alert("💀 Game Over! Final Score: "+score);
location.reload();
}
}

if(e.offsetTop>600){
e.remove();
clearInterval(fall);
}

if(!e.isConnected){clearInterval(fall);}
},40);
}

setInterval(createEnemy,1200);
</script>

</body>
</html>
